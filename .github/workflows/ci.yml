name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chatbot_user
          POSTGRES_PASSWORD: chatbot_pass
          POSTGRES_DB: chatbot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatbot_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://chatbot_user:chatbot_pass@localhost:5432/chatbot_db
      JWT_SECRET_KEY: ci-test-secret-key-not-used-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest